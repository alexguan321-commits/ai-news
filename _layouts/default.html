<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
            <div class="nav-links">
                <a href="{{ '/' | relative_url }}">首页</a>
                <a href="{{ '/#morning' | relative_url }}">早报</a>
                <a href="{{ '/#noon' | relative_url }}">午报</a>
                <a href="{{ '/#evening' | relative_url }}">晚报</a>
            </div>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. Powered by Jekyll & Vercel.</p>
    </footer>
</body>
</html>
